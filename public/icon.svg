<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#283831"/>
  <defs>
    <!-- 茶碗は y=268 より下のみ表示 -->
    <clipPath id="bowlClip">
      <rect x="0" y="268" width="512" height="244"/>
    </clipPath>
    <!-- ご飯は y=268 より上のみ表示 -->
    <clipPath id="riceClip">
      <rect x="0" y="0" width="512" height="268"/>
    </clipPath>
  </defs>

  <!-- 茶碗（楕円の下半分） -->
  <ellipse cx="256" cy="268" rx="158" ry="170"
    fill="#F2C14E" clip-path="url(#bowlClip)"/>

  <!-- ご飯（楕円の上半分） -->
  <ellipse cx="256" cy="268" rx="142" ry="110"
    fill="#F4F1E8" clip-path="url(#riceClip)"/>

  <!-- ご飯のつや（ハイライト） -->
  <ellipse cx="220" cy="228" rx="48" ry="22"
    fill="white" opacity="0.18" transform="rotate(-18 220 228)"/>

  <!-- 茶碗のリム（縦長楕円でひと回り大きく） -->
  <ellipse cx="256" cy="268" rx="164" ry="22" fill="#D9A730"/>
</svg>
